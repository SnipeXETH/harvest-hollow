<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#7ec850" />
    <title>Harvest Hollow</title>
    <style>
      @font-face {
        font-family: "Fredoka";
        font-weight: 400;
        font-display: swap;
        src: url("fonts/fredoka-400.ttf") format("truetype");
      }
      @font-face {
        font-family: "Fredoka";
        font-weight: 500;
        font-display: swap;
        src: url("fonts/fredoka-500.ttf") format("truetype");
      }
      @font-face {
        font-family: "Fredoka";
        font-weight: 600;
        font-display: swap;
        src: url("fonts/fredoka-600.ttf") format("truetype");
      }
      @font-face {
        font-family: "Fredoka";
        font-weight: 700;
        font-display: swap;
        src: url("fonts/fredoka-700.ttf") format("truetype");
      }
      :root {
        color-scheme: light;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #bfe6ad;
        font-family: "Fredoka", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        touch-action: none;
      }
      #game {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
      }
      #game canvas {
        display: block;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #d4eefb 0%, #bfe6ad 100%);
        color: #4a3826;
        font-weight: 600;
        font-size: 22px;
        letter-spacing: 0.3px;
        z-index: 10;
        transition: opacity 0.4s ease;
      }

      /* ---- HTML game UI overlay ---- */
      :root {
        --cream: #fffdf6;
        --ink: #4a3826;
        --ink-soft: #9c8a6e;
        --green: #62b73d;
        --green-dk: #4c9a2d;
        --gold: #ffc23d;
        --blue: #36a7e0;
        --track: #e7ddc8;
      }
      #ui {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        font-family: "Fredoka", system-ui, sans-serif;
        color: var(--ink);
        -webkit-user-select: none;
        user-select: none;
      }
      #ui .panel {
        pointer-events: auto;
        background: var(--cream);
        box-shadow: 0 4px 0 rgba(58, 44, 26, 0.12);
      }
      /* Top HUD */
      #hud {
        position: absolute;
        top: calc(10px + env(safe-area-inset-top));
        left: 10px;
        right: 10px;
        height: 56px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px;
      }
      #hud .stat {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 20px;
        font-weight: 600;
      }
      #hud .stat.gem { color: var(--blue); }
      #hud .spacer { flex: 1; }
      .badge {
        width: 46px; height: 46px; border-radius: 50%;
        display: grid; place-items: center;
        background: conic-gradient(var(--gold) calc(var(--p, 0) * 1%), var(--track) 0);
      }
      .badge .inner {
        width: 36px; height: 36px; border-radius: 50%;
        background: var(--green); color: #fff;
        display: grid; place-items: center;
        font-weight: 700; font-size: 17px;
      }
      /* Right chips */
      #chips {
        position: absolute;
        top: calc(76px + env(safe-area-inset-top));
        right: 12px;
        display: flex; gap: 8px;
      }
      .chip {
        pointer-events: auto;
        width: 40px; height: 40px; border-radius: 50%;
        background: var(--cream);
        box-shadow: 0 3px 0 rgba(58, 44, 26, 0.12);
        display: grid; place-items: center;
        font-size: 16px; font-weight: 700;
        cursor: pointer;
      }
      .chip.on { background: var(--green); color: #fff; }
      .chip:active { transform: scale(0.92); }
      /* Hint */
      #hint {
        position: absolute;
        left: 50%;
        bottom: calc(108px + env(safe-area-inset-bottom));
        transform: translateX(-50%);
        pointer-events: auto;
        display: none;
        align-items: center;
        gap: 10px;
        background: var(--cream);
        box-shadow: 0 4px 0 rgba(58, 44, 26, 0.12);
        border-radius: 18px;
        padding: 8px 10px 8px 16px;
        font-size: 15px; font-weight: 600;
        white-space: nowrap;
      }
      #hint.show { display: flex; }
      #hint .x {
        width: 24px; height: 24px; border-radius: 50%;
        background: var(--track); color: var(--ink);
        display: grid; place-items: center; font-weight: 700;
      }
      /* Bottom toolbar */
      #toolbar {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        pointer-events: auto;
        display: flex;
        justify-content: center;
        gap: 14px;
        padding: 10px 12px calc(12px + env(safe-area-inset-bottom));
        background: linear-gradient(180deg, rgba(58,44,26,0) 0%, rgba(58,44,26,0.10) 100%);
      }
      .tool {
        pointer-events: auto;
        flex: 1;
        max-width: 130px;
        min-height: 60px;
        border: none;
        border-radius: 18px;
        background: var(--cream);
        box-shadow: 0 4px 0 rgba(58, 44, 26, 0.16);
        color: var(--ink);
        font-family: inherit;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 2px;
        cursor: pointer;
        transition: transform 0.06s ease;
      }
      .tool .ico { font-size: 26px; line-height: 1; }
      .tool .lbl { font-size: 13px; font-weight: 600; }
      .tool:active { transform: translateY(2px) scale(0.97); box-shadow: 0 2px 0 rgba(58,44,26,0.16); }
      .tool.active { background: var(--green); color: #fff; box-shadow: 0 4px 0 var(--green-dk); }
      /* Sheets / modals */
      #backdrop {
        position: absolute; inset: 0;
        pointer-events: auto;
        background: rgba(0, 0, 0, 0.42);
        display: none;
        z-index: 6;
      }
      #backdrop.show { display: block; }
      .sheet {
        position: absolute; left: 0; right: 0; bottom: 0;
        background: var(--cream);
        border-radius: 26px 26px 0 0;
        padding: 14px 18px calc(22px + env(safe-area-inset-bottom));
        box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.18);
        transform: translateY(100%);
        transition: transform 0.26s cubic-bezier(0.2, 0.8, 0.2, 1);
        max-height: 80%;
        overflow-y: auto;
      }
      #backdrop.show .sheet { transform: translateY(0); }
      .sheet .grab { width: 44px; height: 5px; border-radius: 3px; background: #d8cdb6; margin: 0 auto 10px; }
      .sheet h2 { text-align: center; font-size: 23px; font-weight: 700; margin-bottom: 14px; }
      .sheet p { text-align: center; color: var(--ink-soft); font-size: 16px; line-height: 1.5; }
      .seed {
        display: flex; align-items: center; gap: 12px;
        background: #f5eede; border-radius: 16px;
        padding: 10px 14px; margin-bottom: 10px;
      }
      .seed.locked { background: #eae3d4; }
      .seed .emoji { font-size: 34px; }
      .seed .meta { flex: 1; }
      .seed .name { font-size: 19px; font-weight: 600; }
      .seed.locked .name { color: #c8bca4; }
      .seed .sub { font-size: 13px; color: var(--ink-soft); }
      .seed .pick {
        border: none; font-family: inherit; cursor: pointer;
        background: var(--green); color: #fff;
        box-shadow: 0 3px 0 var(--green-dk);
        border-radius: 12px; padding: 9px 16px; font-size: 15px; font-weight: 600;
      }
      .seed .pick:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--green-dk); }
      .seed .lock { color: #c8bca4; font-weight: 600; font-size: 15px; }
      .bigbtn {
        display: block; width: 100%; margin-top: 16px;
        border: none; font-family: inherit; cursor: pointer;
        background: var(--green); color: #fff; box-shadow: 0 4px 0 var(--green-dk);
        border-radius: 16px; padding: 15px; font-size: 18px; font-weight: 600;
      }
      .bigbtn:disabled { background: #c8bca4; box-shadow: 0 4px 0 #b3a58f; opacity: 0.8; }
      .bigbtn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--green-dk); }
      /* Toast */
      #toast {
        position: absolute; left: 50%; top: 18%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.72); color: #fff;
        font-weight: 600; font-size: 16px;
        padding: 10px 18px; border-radius: 16px;
        opacity: 0; transition: opacity 0.3s ease;
        pointer-events: none; white-space: nowrap;
      }
      #toast.show { opacity: 1; }

      /* Left chips (goals / daily) */
      #chips-left {
        position: absolute;
        top: calc(76px + env(safe-area-inset-top));
        left: 12px;
        display: flex;
        gap: 8px;
      }
      .chip { position: relative; }
      .chip .dot {
        position: absolute;
        top: -3px; right: -3px;
        width: 13px; height: 13px;
        border-radius: 50%;
        background: #ef4444;
        border: 2px solid #fff;
        display: none;
      }
      /* Quests */
      .quest {
        display: flex; align-items: center; gap: 12px;
        background: #f5eede; border-radius: 16px;
        padding: 10px 14px; margin-bottom: 10px;
      }
      .quest.done { background: #eaf7df; }
      .quest .emoji { font-size: 30px; }
      .quest .meta { flex: 1; }
      .quest .name { font-size: 17px; font-weight: 600; }
      .quest .sub { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
      .quest .qreward { font-size: 14px; font-weight: 600; color: var(--ink-soft); white-space: nowrap; }
      .qbar { height: 8px; background: var(--track); border-radius: 5px; margin: 6px 0 2px; overflow: hidden; }
      .qfill { height: 100%; background: var(--green); border-radius: 5px; transition: width 0.3s ease; }
      /* Daily strip */
      .daystrip { display: flex; gap: 6px; justify-content: center; margin: 14px 0 4px; }
      .daybox {
        flex: 1; text-align: center; font-size: 12px; font-weight: 600;
        color: var(--ink-soft); background: #f0e8d8; border-radius: 10px; padding: 8px 2px;
      }
      .daybox.cur { background: var(--gold); color: var(--ink); }
      /* Level-up / reward celebration */
      #celebrate {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        pointer-events: none; opacity: 0;
        z-index: 7;
      }
      #celebrate.show { animation: celpop 1.7s ease forwards; }
      @keyframes celpop {
        0% { opacity: 0; transform: scale(0.7); }
        12% { opacity: 1; transform: scale(1.05); }
        20% { transform: scale(1); }
        80% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(1.04); }
      }
      .cel-card {
        background: linear-gradient(180deg, #fffdf6, #fff3d6);
        border: 3px solid var(--gold);
        border-radius: 22px;
        padding: 22px 34px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      }
      .cel-title { font-size: 27px; font-weight: 700; color: var(--ink); }
      .cel-sub { font-size: 18px; font-weight: 600; color: var(--green-dk); margin-top: 4px; }

      /* Decoration store */
      .store-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin: 12px 0;
      }
      .store-item {
        background: #f5eede; border-radius: 16px;
        padding: 10px 6px; text-align: center; cursor: pointer;
        transition: transform 0.06s ease;
      }
      .store-item:active { transform: scale(0.94); }
      .store-emoji { font-size: 38px; line-height: 1.1; }
      .store-name { font-size: 13px; font-weight: 600; color: var(--ink); margin-top: 2px; }
      .store-cost { font-size: 13px; font-weight: 600; color: #caa12a; }
      .store-item.bag { background: #eaf7df; }
      .store-item.bag .store-cost { color: var(--green-dk); }
      .store-sub { font-size: 14px; font-weight: 600; color: var(--ink-soft); margin: 6px 2px 0; text-align: left; }
      .bigbtn.alt { background: #e6dcc6; color: var(--ink); box-shadow: 0 4px 0 #cdbf9f; }

      /* Combo popup */
      #combo {
        position: absolute; left: 50%; top: 30%;
        transform: translateX(-50%);
        pointer-events: none; opacity: 0;
        font-size: 30px; font-weight: 700; color: #fff;
        text-shadow: 0 2px 0 #c0392b, 0 0 14px rgba(255, 120, 40, 0.7);
        z-index: 7;
        transition: opacity 0.3s ease;
      }
      #combo.show { animation: combopop 0.5s ease forwards; }
      @keyframes combopop {
        0% { opacity: 0; transform: translateX(-50%) scale(0.5); }
        40% { opacity: 1; transform: translateX(-50%) scale(1.25); }
        70% { transform: translateX(-50%) scale(1); }
        100% { opacity: 1; transform: translateX(-50%) scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="loading">🌱 Harvest Hollow</div>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
